    <!-- Blog Start -->
    <div class="container-fluid py-5">
        <div class="container">

            <div class="row g-5">
            <center>
                <h1>Upload Test Data</h1>
                ==============0============

                <div class="tab-content">
    <font color="red">{{data}}</font>
  <div class="tab-pane fade show active" id="pills-login" role="tabpanel" aria-labelledby="tab-login">
    <form action="/userapp/CropAction" method="post">
         {%csrf_token%}



      <!-- Email input -->
      <div class="form-outline mb-4">
        <input type="number" id="name" name="nitrogen" class="form-control" min="0" max="1000" placeholder="0-1000" required />
        <label class="form-label" for="loginName"> Ratio of Nitrogen Content in Soil (kg/ha) - Min: 0, Max: 1000</label>
      </div>
         <div class="form-outline mb-4">
        <input type="number" id="email" name="phosphorous" class="form-control" min="0" max="50" placeholder="0-50" required />
        <label class="form-label" for="loginName">Ratio of Phosphorous Content in Soil (kg/ha) - Min: 0, Max: 50</label>
      </div>

         <div class="form-outline mb-4">
        <input type="number" id="mobile" name="potassium" class="form-control" min="0" max="600" placeholder="0-600" required />
        <label class="form-label" for="loginName">Ratio of Potassium Content in Soil (kg/ha) - Min: 0, Max: 600</label>
      </div>

         <div class="form-outline mb-4">
        <input type="number" id="address" name="temp" class="form-control" min="10" max="45" step="0.1" placeholder="10-45" required />
        <label class="form-label" for="loginName">Temperature in Degree Celsius - Min: 10, Max: 45</label>
      </div>

        <div class="form-outline mb-4">
        <input type="number" id="loginName" name="humidity" class="form-control" min="20" max="90" step="0.1" placeholder="20-90" required />
        <label class="form-label" for="loginName">Humidity in % - Min: 20, Max: 90</label>
      </div>

      <!-- Password input -->
      <div class="form-outline mb-4">
        <input type="number" id="loginPassword" name="phvalue" class="form-control" min="4.5" max="9.0" step="0.1" placeholder="4.5-9.0" required />
        <label class="form-label" for="loginPassword">pH Value of the Soil - Min: 4.5, Max: 9.0</label>
      </div>

        <div class="form-outline mb-4">
        <input type="number" id="rain" name="rainfall" class="form-control" min="0" max="3000" placeholder="0-3000" required />
        <label class="form-label" for="loginName">Rainfall in mm - Min: 0, Max: 3000</label>
      </div>

      <!-- 2 column grid layout -->
      <div class="row mb-4">
        <div class="col-md-6 d-flex justify-content-center">

        </div>


      </div>

      <!-- Submit button -->
      <button type="submit" class="btn btn-primary btn-block mb-4">Check Recommended Crop</button>


    </form>
